name: build-qcow2

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Build qcow2 image
        working-directory: nixos
        run: |
          nix build .#qcow2 --print-build-logs --no-write-lock-file
          ls -la result

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "Debug: nixos/result listing"
          ls -la nixos/result || true
          echo "Debug: nixos/result resolved"
          RESOLVED="$(readlink -f nixos/result || true)"
          echo "${RESOLVED}"

          # nixos-generators output may be a symlink and the qcow2 can be nested.
          QCOW2="$(find -L nixos/result -maxdepth 3 -type f \( -name '*.qcow2' -o -name '*.qcow' \) -print -quit || true)"
          if [ -z "${QCOW2}" ] && [ -n "${RESOLVED}" ] && [ -d "${RESOLVED}" ]; then
            echo "Debug: searching resolved store path"
            QCOW2="$(find "${RESOLVED}" -maxdepth 3 -type f \( -name '*.qcow2' -o -name '*.qcow' \) -print -quit || true)"
          fi
          if [ -z "${QCOW2}" ]; then
            echo "ERROR: Could not locate qcow2 in nixos/result"
            echo "Debug: tree (maxdepth 3)"
            find -L nixos/result -maxdepth 3 -print || true
            if [ -n "${RESOLVED}" ]; then
              echo "Debug: resolved path tree (maxdepth 3)"
              find "${RESOLVED}" -maxdepth 3 -print || true
            fi
            exit 1
          fi
          echo "Using image: ${QCOW2}"
          cp "$QCOW2" "dist/nix-docker-vm.qcow2"
          echo "Compressing qcow2 for GitHub Releases..."
          zstd -T0 -19 --rm "dist/nix-docker-vm.qcow2" -o "dist/nix-docker-vm.qcow2.zst"
          (cd dist && sha256sum nix-docker-vm.qcow2.zst > nix-docker-vm.qcow2.zst.sha256)
          echo "Built: $(sha256sum dist/nix-docker-vm.qcow2.zst)"

      - name: Create version tag
        id: version
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TS="$(date -u +%Y%m%d-%H%M%S)"
          TAG="qcow2-${TS}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/nix-docker-vm.qcow2.zst
            dist/nix-docker-vm.qcow2.zst.sha256

